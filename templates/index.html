<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stitch Messenger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Auth Screen -->
        <div id="auth-screen" class="screen active">
            <div class="auth-box">
                <div class="auth-icon">
                    <i class="fas fa-paper-plane"></i>
                </div>
                <h1>Stitch Messenger</h1>
                <div class="auth-subtitle">Добро пожаловать в мессенджер</div>
                <div class="tabs">
                    <button class="tab-btn active" onclick="showAuthTab('login')">Вход</button>
                    <button class="tab-btn" onclick="showAuthTab('register')">Регистрация</button>
                </div>
                
                <form id="login-form" class="auth-form active">
                    <div class="input-group">
                        <input type="text" id="login-username" placeholder="Имя пользователя" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="login-password" placeholder="Пароль" required>
                    </div>
                    <button type="submit">Войти</button>
                </form>
                
                <form id="register-form" class="auth-form">
                    <div class="input-group">
                        <input type="text" id="register-username" placeholder="Имя пользователя" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="register-password" placeholder="Пароль" required>
                    </div>
                    <button type="submit">Зарегистрироваться</button>
                </form>
            </div>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen" class="screen">
            <div class="sidebar">
                <div class="sidebar-header">
                    <div class="user-profile">
                        <div class="avatar" id="current-user-avatar"></div>
                        <span id="current-user-name">User</span>
                    </div>
                    <button id="logout-btn" title="Выйти"><i class="fas fa-sign-out-alt"></i></button>
                </div>
                <div class="search-box">
                    <input type="text" id="user-search" placeholder="Поиск...">
                </div>
                <div class="users-list" id="users-list">
                    <!-- Users will be loaded here -->
                </div>
            </div>
            
            <div class="chat-area">
                <div class="chat-header" id="chat-header" style="display: none;">
                    <div class="avatar" id="chat-user-avatar"></div>
                    <span id="chat-user-name">Select a user</span>
                </div>
                
                <div class="messages-container" id="messages-container">
                    <div class="empty-state">Выберите чат для начала общения</div>
                </div>
                
                <div class="input-area" id="input-area" style="display: none;">
                    <button id="attach-btn"><i class="fas fa-paperclip"></i></button>
                    <input type="file" id="file-input" style="display: none;">
                    <div class="input-wrapper">
                        <input type="text" id="message-input" placeholder="Написать сообщение...">
                        <i class="far fa-smile" style="color: var(--secondary-text); cursor: pointer;"></i>
                    </div>
                    <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
